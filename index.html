<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Study AI App</title>
</head>
<body>
    <header>
        <h1>Welcome to Study AI App</h1>
        <input type="text" placeholder="Search..." aria-label="Search">
    </header>
    <main>
        <section>
            <h2>Upload Images</h2>
            <input type="file" accept="image/*" multiple id="imageUpload">
        </section>
        <section>
            <h2>Record Audio</h2>
            <button id="recordBtn">Record</button>
            <audio controls id="audioPlayback"></audio>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Study AI App</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
